<svg width="600" height="200" viewBox="0 0 600 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="borderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#708090;stop-opacity:0.5" />
            <stop offset="50%" style="stop-color:#4682B4;stop-opacity:0.5" />
            <stop offset="100%" style="stop-color:#FF7F50;stop-opacity:0.5" />
        </linearGradient>
    </defs>

    <!-- Icon (scaled down and positioned) -->
    <g transform="translate(20, 20) scale(0.625)">
        <!-- Border circle with gradient -->
        <circle cx="128" cy="128" r="115" fill="none" stroke="url(#borderGradient)" stroke-width="12"/>

        <!-- Connection lines -->
        <line x1="70" y1="90" x2="128" y2="128" stroke="#708090" stroke-width="6" opacity="0.5"/>
        <line x1="186" y1="90" x2="128" y2="128" stroke="#4682B4" stroke-width="6" opacity="0.5"/>
        <line x1="70" y1="166" x2="128" y2="128" stroke="#FF7F50" stroke-width="6" opacity="0.5"/>
        <line x1="186" y1="166" x2="128" y2="128" stroke="#708090" stroke-width="6" opacity="0.5"/>
        <line x1="70" y1="90" x2="186" y2="90" stroke="#4682B4" stroke-width="6" opacity="0.3"/>
        <line x1="70" y1="166" x2="186" y2="166" stroke="#FF7F50" stroke-width="6" opacity="0.3"/>

        <!-- Nodes -->
        <circle cx="70" cy="90" r="22" fill="#708090"/>
        <circle cx="186" cy="90" r="22" fill="#4682B4"/>
        <circle cx="70" cy="166" r="22" fill="#FF7F50"/>
        <circle cx="186" cy="166" r="22" fill="#708090"/>
        <circle cx="128" cy="128" r="28" fill="#FF7F50"/>
    </g>

    <!-- Text - Two lines -->
    <text x="200" y="85" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#FF7F50">
        Modern
    </text>
    <text x="200" y="138" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#708090">
        Tribes
    </text>
</svg>